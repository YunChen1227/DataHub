# DataHub 运行配置示例（敏感信息不要进代码/不要提交真实值）
#
# 用法：
#   cp config.example.yaml config.yaml   # config.yaml 已被 .gitignore 忽略
#   # 填入真实地址/凭证后启动
#   go run ./cmd/relay
#
# 也可用环境变量 CONFIG_FILE 指定其它路径：CONFIG_FILE=/etc/datahub/config.yaml
#
# 三版本 (x1/v9/v8) 对外接口完全一致，仅靠路由名区分：
#   POST /v1/openapi/zlx/querySrmxX1 | querySrmxV9 | querySrmxV8
#   GET  /v1/openapi/zlx/quotaX1     | quotaV9     | quotaV8
# 每个版本各自独立：独立上游 + 独立数据库 + 独立 Redis 逻辑库 + 独立统计。
#
# 注：durations 支持 Go 风格字符串，如 4s / 10s / 5m / 8h。

# HTTP 服务监听地址
addr: ":8080"

upstream:
  # 所有版本共用的上游调用超时
  timeout: "4s"

billing:
  requeryInterval: "10s"   # PENDING 复查间隔

admin:
  # 后台统一登录账号 + JWT（控制面 = x1 版本库）
  bootstrapUser: "admin"
  bootstrapPass: "REPLACE_WITH_ADMIN_PASSWORD"
  jwtSecret: "REPLACE_WITH_ADMIN_JWT_SECRET"
  tokenTTL: "8h"
  spaDir: "web/admin/dist"

# 开发期预置 demo license 的绑定 secret（生产由管理后台为每个用户生成）
demo:
  appSecret: "REPLACE_WITH_DEMO_APP_SECRET"

# 存储后端 (DESIGN §11): memory（开发/默认）| postgres（生产，每版本独立 PG + Redis）。
storage:
  driver: "memory"          # memory | postgres
  migrationsDir: "migrations"

# 每版本独立配置。memory 模式下 database/redis 可省略；postgres 模式必须各自独立。
versions:
  x1:
    upstream:
      kind: "gama"          # x1 对接上游 A
      baseURL: "REPLACE_WITH_X1_UPSTREAM_DOCHECK_URL"
      appId: "REPLACE_WITH_X1_UPSTREAM_APP_ID"
      appSecret: "REPLACE_WITH_X1_UPSTREAM_APP_SECRET"
      apiKey: "gama_ctmz_layer_score"
    database:
      host: "REPLACE_WITH_PG_HOST"
      port: 5432
      name: "datahub_x1_db"
      user: "REPLACE_WITH_PG_USER"
      password: "REPLACE_WITH_PG_PASSWORD"
      sslmode: "disable"
      maxConns: 10
    redis:
      addr: "REPLACE_WITH_REDIS_HOST:6379"
      username: "REPLACE_WITH_REDIS_USER"
      password: "REPLACE_WITH_REDIS_PASSWORD"
      db: 0
      poolSize: 10
  v9:
    upstream:
      kind: "income"        # v9 对接上游 B（GET account/key 验签）
      baseURL: "REPLACE_WITH_V9_UPSTREAM_URL"
      account: "REPLACE_WITH_V9_UPSTREAM_ACCOUNT"
      key: "REPLACE_WITH_V9_UPSTREAM_KEY"
    database:
      host: "REPLACE_WITH_PG_HOST"
      port: 5432
      name: "datahub_v9_db"
      user: "REPLACE_WITH_PG_USER"
      password: "REPLACE_WITH_PG_PASSWORD"
      sslmode: "disable"
      maxConns: 10
    redis:
      addr: "REPLACE_WITH_REDIS_HOST:6379"
      username: "REPLACE_WITH_REDIS_USER"
      password: "REPLACE_WITH_REDIS_PASSWORD"
      db: 1
      poolSize: 10
  v8:
    upstream:
      kind: "income"        # v8 对接上游 C（GET account/key 验签）
      baseURL: "REPLACE_WITH_V8_UPSTREAM_URL"
      account: "REPLACE_WITH_V8_UPSTREAM_ACCOUNT"
      key: "REPLACE_WITH_V8_UPSTREAM_KEY"
    database:
      host: "REPLACE_WITH_PG_HOST"
      port: 5432
      name: "datahub_v8_db"
      user: "REPLACE_WITH_PG_USER"
      password: "REPLACE_WITH_PG_PASSWORD"
      sslmode: "disable"
      maxConns: 10
    redis:
      addr: "REPLACE_WITH_REDIS_HOST:6379"
      username: "REPLACE_WITH_REDIS_USER"
      password: "REPLACE_WITH_REDIS_PASSWORD"
      db: 2
      poolSize: 10
