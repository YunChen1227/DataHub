# DataHub 运行配置示例（敏感信息不要进代码/不要提交真实值）
#
# 用法：
#   cp config.example.yaml config.yaml   # config.yaml 已被 .gitignore 忽略
#   # 填入真实地址/凭证后启动
#   go run ./cmd/relay
#
# 也可用环境变量 CONFIG_FILE 指定其它路径：CONFIG_FILE=/etc/datahub/config.yaml
#
# 注：durations 支持 Go 风格字符串，如 4s / 10s / 5m / 8h。

# HTTP 服务监听地址
addr: ":8080"

upstream:
  # 当前唯一上游 provider：gama（保留字段便于未来扩展）
  provider: "gama"
  # 上游调用超时
  timeout: "4s"

  # 上游：伽马分层分（伽马PDF /enol/api/v1/doCheck），本服务唯一上游。appId/appSecret 由商务分配。
  gama:
    baseURL: "https://api.enolfax.com/enol/api/v1/doCheck"  # 测试: https://testenol.cn/...
    appId: "REPLACE_WITH_GAMA_APP_ID"
    appSecret: "REPLACE_WITH_GAMA_APP_SECRET"
    apiKey: "gama_ctmz_layer_score"   # 固定产品编号

billing:
  requeryInterval: "10s"   # PENDING 复查间隔

admin:
  bootstrapUser: "admin"
  bootstrapPass: "REPLACE_WITH_ADMIN_PASSWORD"
  jwtSecret: "REPLACE_WITH_ADMIN_JWT_SECRET"
  tokenTTL: "8h"
  spaDir: "web/admin/dist"

# 开发期预置 demo license 的绑定 secret（生产由管理后台为每个用户生成）
demo:
  appSecret: "REPLACE_WITH_DEMO_APP_SECRET"

# 存储后端 (DESIGN §11): memory（开发/默认）| postgres（生产，PG + Redis）。
storage:
  driver: "memory"          # memory | postgres
  migrationsDir: "migrations"

# PostgreSQL：license / 计费台账 / 审计 / 管理员 / IP 白名单（仅 driver=postgres 时使用）。
database:
  host: "REPLACE_WITH_PG_HOST"
  port: 5432
  name: "REPLACE_WITH_PG_DBNAME"
  user: "REPLACE_WITH_PG_USER"
  password: "REPLACE_WITH_PG_PASSWORD"
  sslmode: "disable"        # disable | require（实例强制 SSL 时用 require）
  maxConns: 10

# Redis：双维度配额原子计数（仅 driver=postgres 时使用）。Aliyun 用 username+password。
redis:
  addr: "REPLACE_WITH_REDIS_HOST:6379"
  username: "REPLACE_WITH_REDIS_USER"
  password: "REPLACE_WITH_REDIS_PASSWORD"
  db: 0
  poolSize: 10
